name: Publish Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[test] build twine

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import jamolib

          actual = os.environ["RELEASE_TAG"]
          expected = f"v{jamolib.__version__}"
          if actual != expected:
              raise SystemExit(
                  f"Release tag {actual!r} does not match package version {expected!r}."
              )

          print(f"Release tag matches package version: {actual}")
          PY

      - name: Run tests
        run: pytest

      - name: Build release distributions
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/*

  pypi-publish:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment:
      name: pypi

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
