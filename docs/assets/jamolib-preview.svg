<svg width="960" height="560" viewBox="0 0 960 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">JamoLib example preview</title>
  <desc id="desc">A terminal-style preview showing example input and output from JamoLib.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF4EA"/>
      <stop offset="1" stop-color="#F1E1D2"/>
    </linearGradient>
    <linearGradient id="panel" x1="84" y1="76" x2="862" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101923"/>
      <stop offset="1" stop-color="#1C2735"/>
    </linearGradient>
  </defs>
  <rect width="960" height="560" rx="26" fill="url(#bg)"/>
  <rect x="72" y="64" width="816" height="432" rx="28" fill="url(#panel)"/>
  <rect x="72" y="64" width="816" height="54" rx="28" fill="#0C131C"/>
  <circle cx="112" cy="91" r="7" fill="#FF6F61"/>
  <circle cx="136" cy="91" r="7" fill="#FFCA57"/>
  <circle cx="160" cy="91" r="7" fill="#57CC99"/>
  <text x="196" y="98" fill="#8FA8C7" font-family="Courier New, monospace" font-size="18">python examples/quickstart.py</text>
  <text x="110" y="162" fill="#9BB5D6" font-family="Courier New, monospace" font-size="20">Original:</text>
  <text x="272" y="162" fill="#FFFFFF" font-family="Courier New, monospace" font-size="26">한글과 English 123</text>
  <text x="110" y="222" fill="#9BB5D6" font-family="Courier New, monospace" font-size="20">Decomposed:</text>
  <text x="272" y="222" fill="#F6D365" font-family="Courier New, monospace" font-size="26">ㅎㅏㄴㄱㅡㄹㄱㅘ English 123</text>
  <text x="110" y="282" fill="#9BB5D6" font-family="Courier New, monospace" font-size="20">Recomposed:</text>
  <text x="272" y="282" fill="#FFFFFF" font-family="Courier New, monospace" font-size="26">한글과 English 123</text>
  <text x="110" y="342" fill="#9BB5D6" font-family="Courier New, monospace" font-size="20">Batchim:</text>
  <text x="272" y="342" fill="#7DE2D1" font-family="Courier New, monospace" font-size="26">ㄱㅏㅂㅅㅇㅣ -&gt; 값이</text>
  <text x="110" y="402" fill="#9BB5D6" font-family="Courier New, monospace" font-size="20">Keyboard:</text>
  <text x="272" y="402" fill="#F8AFA6" font-family="Courier New, monospace" font-size="26">dkssudgktpdy -&gt; 안녕하세요</text>
  <rect x="112" y="442" width="190" height="28" rx="14" fill="#223246"/>
  <text x="132" y="461" fill="#A9C1E8" font-family="Verdana, DejaVu Sans, sans-serif" font-size="15" font-weight="700">single-pass scanner</text>
  <rect x="320" y="442" width="178" height="28" rx="14" fill="#223246"/>
  <text x="347" y="461" fill="#FAD7A0" font-family="Verdana, DejaVu Sans, sans-serif" font-size="15" font-weight="700">mixed-text safe</text>
  <rect x="516" y="442" width="206" height="28" rx="14" fill="#223246"/>
  <text x="540" y="461" fill="#7DE2D1" font-family="Verdana, DejaVu Sans, sans-serif" font-size="15" font-weight="700">batchim-aware compose</text>
</svg>
